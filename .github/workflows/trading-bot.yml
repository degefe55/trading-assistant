name: Trading Bot

on:
  # Manual trigger for testing
  workflow_dispatch:
    inputs:
      brief_type:
        description: "Brief type to run"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - premarket
          - midsession
          - preclose
          - eod
          - commands
      mock_mode:
        description: "Use mock data?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

  # Scheduled runs - each brief gets its own cron
  # Using dedicated crons instead of shared polling so each brief type
  # is explicitly scheduled and won't fall through to wrong type if delayed
  schedule:
    # KSA 3:30 PM = UTC 12:30 - premarket brief
    - cron: "30 12 * * 1-5"
    # KSA 7:30 PM = UTC 16:30 - midsession check (only alerts if material change)
    - cron: "30 16 * * 1-5"
    # KSA 10:30 PM = UTC 19:30 - preclose verdict
    - cron: "30 19 * * 1-5"
    # KSA 11:00 PM = UTC 20:00 - end of day summary
    - cron: "0 20 * * 1-5"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine brief type from schedule (tolerant to cron delays)
        id: brief
        run: |
          if [ "${{ github.event_name }}" == "schedule" ]; then
            # Use hour ranges to tolerate GitHub cron delays up to ~30 min
            # Each brief only fires once per day because schedule only triggers near target
            HOUR=$(date -u +'%H')
            MIN=$(date -u +'%M')
            # Convert to total minutes from start of day for range matching
            TOTAL_MIN=$((10#$HOUR * 60 + 10#$MIN))
            # Target times in minutes: 12:30=750, 16:30=990, 19:30=1170, 20:00=1200
            if   [ $TOTAL_MIN -ge 745 ] && [ $TOTAL_MIN -le 790 ]; then
              echo "brief_type=premarket" >> $GITHUB_OUTPUT
            elif [ $TOTAL_MIN -ge 985 ] && [ $TOTAL_MIN -le 1030 ]; then
              echo "brief_type=midsession" >> $GITHUB_OUTPUT
            elif [ $TOTAL_MIN -ge 1165 ] && [ $TOTAL_MIN -le 1195 ]; then
              echo "brief_type=preclose" >> $GITHUB_OUTPUT
            elif [ $TOTAL_MIN -ge 1196 ] && [ $TOTAL_MIN -le 1230 ]; then
              echo "brief_type=eod" >> $GITHUB_OUTPUT
            else
              # Shouldn't normally happen - fallback is harmless test mode
              echo "brief_type=test" >> $GITHUB_OUTPUT
            fi
            echo "mock_mode=false" >> $GITHUB_OUTPUT
          else
            echo "brief_type=${{ github.event.inputs.brief_type }}" >> $GITHUB_OUTPUT
            echo "mock_mode=${{ github.event.inputs.mock_mode }}" >> $GITHUB_OUTPUT
          fi

      - name: Run trading bot
        env:
          BRIEF_TYPE: ${{ steps.brief.outputs.brief_type }}
          MOCK_MODE: ${{ steps.brief.outputs.mock_mode }}
          DEBUG_MODE: "true"
          ACTIVE_MARKETS: "US"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          python main.py
