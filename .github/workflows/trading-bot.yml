# ============================================================================
# Trading Bot Workflow
#
# Scheduling now lives in webhook/app.py running on Railway. GitHub Actions
# scheduled crons were arriving 2+ hours late (queue contention), so the
# `schedule:` block has been removed to prevent duplicate firings.
#
# This workflow remains for MANUAL runs only (workflow_dispatch).
# ============================================================================
name: Trading Bot

on:
  workflow_dispatch:
    inputs:
      brief_type:
        description: "Brief type to run"
        required: true
        default: "test"
        type: choice
        options:
          - test
          - premarket
          - midsession
          - preclose
          - eod
          - commands
      mock_mode:
        description: "Use mock data?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trading bot
        env:
          BRIEF_TYPE: ${{ github.event.inputs.brief_type }}
          MOCK_MODE: ${{ github.event.inputs.mock_mode }}
          DEBUG_MODE: "true"
          ACTIVE_MARKETS: "US"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          MARKETAUX_KEY: ${{ secrets.MARKETAUX_KEY }}
          FRED_KEY: ${{ secrets.FRED_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_URL: ${{ secrets.GOOGLE_SHEET_URL }}
          GOOGLE_SA_JSON: ${{ secrets.GOOGLE_SA_JSON }}
        run: |
          python main.py
